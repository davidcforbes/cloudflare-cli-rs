coverage:
  status:
    project:
      default:
        target: 100%
        threshold: 0.5%
        base: auto
        if_ci_failed: error
        only_pulls: false
    patch:
      default:
        target: 100%
        threshold: 0%
        base: auto
        if_ci_failed: error

  precision: 2
  round: down
  range: "70...100"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "tests/**/*"
  - "**/*.test.rs"
  - "src/main.rs"  # binary entry point: excluded by tarpaulin too (see .tarpaulin.toml)
